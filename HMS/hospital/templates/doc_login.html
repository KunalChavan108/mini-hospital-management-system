{% extends "base.html" %}

{% block css %}
<style>
body{
    background-image:url('https://img.freepik.com/free-photo/futuristic-interior-design-with-bright-light-geometric-shapes_23-2151986975.jpg?semt=ais_rp_50_assets&w=740&q=80');
    background-repeat:no-repeat;
    background-size:cover;
}

.container{
    display:flex;
    justify-content:center;
    padding-top:80px;
}

.form{
    padding:20px;
    border:2px black solid;
    width:100%;
    max-width:400px;
    background-color:#F0F3F5;
    border-radius:5px;
}

.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    height:40px;
    padding-right:40px;
    box-sizing:border-box;
}

.toggle-icon{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}
</style>
{% endblock %}

{% block body %}

<div class="container">

<div class="form">

<h2 class="text-center">Doctor Login</h2>

<form action="/doc_login/" method="POST">
{% csrf_token %}

<label>Email</label>
<input type="email" name="email" class="form-control" placeholder="Enter Email" required>
<br>

<label>Password</label>

<div class="input-group">
<input type="password" name="password" id="password" class="form-control" placeholder="Enter Password" required>
<span id="togglePassword" class="toggle-icon">👁️</span>
</div>

<button class="btn btn-primary w-100">Login</button>

</form>

<p style="color:red">{{msg}}</p>

</div>

</div>

<script>

const togglePassword = document.getElementById("togglePassword");
const password = document.getElementById("password");

togglePassword.addEventListener("click", function(){

    const type = password.getAttribute("type") === "password" ? "text" : "password";
    password.setAttribute("type", type);

    this.textContent = type === "password" ? "👁️" : "🙈";

});

</script>

{% endblock %}
