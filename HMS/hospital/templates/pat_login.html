{% extends "base.html" %}

{% block css %}
<style>
body{
    background-image:url('https://img.freepik.com/free-photo/futuristic-interior-design-with-bright-light-geometric-shapes_23-2151986975.jpg?semt=ais_rp_50_assets&w=740&q=80');
    object-fit:cover;
    background-repeat:no-repeat;
    background-size:cover;
}
    .container {
        display: flex;
        justify-content:center;
        padding-top: 10px;

    }
    .form {
        padding: 20px;
        border: 2px black solid;
        width: 100%;
        max-width: 400px;
        background-color:#F0F3F5;
        border-radius:5px;
    }

    .input-group {
        position: relative;
        margin-bottom: 15px;
    }
    .input-group input {
        width: 100%;
        height: 40px;
        padding-right: 40px; /* Space for the eye */
        box-sizing: border-box;
    }
    .toggle-icon {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        z-index: 10;
    }
    #passwordMessage {
        font-size: 0.9em;
        margin-top: -10px;
        margin-bottom: 10px;
        display: block;
    }
</style>
{% endblock %}

{% block body %}

<div class="container">
    <div class="form">
        <h2>Patient Login</h2>
        <form action="/pat_login/" method="POST">
    {% csrf_token %}

    <label>Enter Email:</label>
    <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
    <br>

    <label>Password</label>
    <div class="input-group">
        <input type="password" name="password" id="password" placeholder="Enter Password" required>
        <span id="togglePassword" class="toggle-icon">👁️</span>
    </div>

    <button class="btn btn-primary w-100" type="submit">Login</button>

</form>

{{msg}}




<script>

    function setupToggle(inputId, toggleId) {
        const input = document.getElementById(inputId);
        const toggle = document.getElementById(toggleId);

        toggle.addEventListener('click', function() {
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            toggle.textContent = isPassword ? '🙈' : '👁️';
        });
    }


</script>

{% endblock %}
